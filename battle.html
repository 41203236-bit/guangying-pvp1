<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>光影對決：視覺增強版</title>
<style>
  :root {
    --panel-bg: rgba(0, 0, 0, 0.85);
    --glow-O: 0 0 40px #f6d26a;
    --glow-X: 0 0 40px #9a7bff;
    --win-line-color: #ccff00;
  }
  body {margin: 0; padding: 0; width: 100vw; height: 100vh;color: white; font-family: "Microsoft JhengHei", sans-serif;display: flex; flex-direction: column; align-items: center; justify-content: center;background: #050816; overflow: hidden; position: relative;}
  
  /* 頂部資訊放大 */
  #topbar{position:fixed;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:9999}
  .pill{background:rgba(0,0,0,.8);border:2px solid rgba(255,255,255,.2);border-radius:20px;padding:12px 24px;backdrop-filter:blur(10px);font-size:1.2rem}
  #turnText{font-weight:900; font-size:1.4rem; color:#f6d26a}

  /* 計時器放大 */
  #timer-container {font-size: 4.5rem; font-weight: bold; color: #00d4ff;padding: 15px 90px; background: var(--panel-bg);border: 5px solid #00d4ff; border-radius: 80px;margin-bottom: 30px; box-shadow: 0 0 40px rgba(0,212,255,0.4); z-index:10}

  .bg-layer {position: fixed; top: 0; left: 0; width: 100%; height: 100%;background: #050816 url('Gemini_Generated_Image_axefmzaxefmzaxef.jpg') center/cover no-repeat;filter: brightness(0.25); z-index: -2;}
  
  /* 遊戲主體放大 */
  .game-main {display: flex; align-items: center; justify-content: center; gap: 30px; width: 98%; max-width: 1600px;}

  /* 血條容器放大 */
  .hp-visual-container { position: relative; width: 130px; height: 550px; }
  .hp-text { position: absolute; width: 100%; text-align: center;font-size: 1.6rem; font-weight: 900; color: #fff;text-shadow: 0 0 10px #000; z-index: 10; top: 10px; }

  /* 角色面板大幅強化 */
  .side-panel {position:relative; display: flex; align-items: center; gap: 25px; background: var(--panel-bg); padding: 35px; border-radius: 45px; border: 4px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
  
  /* 放大頭像 */
  .avatar { width: 180px; height: 340px; border-radius: 25px; object-fit: cover; border: 4px solid rgba(255,255,255,0.2); filter: brightness(0.5); transition: all 0.4s ease; }
  .active-side-O .avatar { filter: brightness(1.2); border-color: #f6d26a; box-shadow: var(--glow-O); transform: scale(1.05); }
  .active-side-X .avatar { filter: brightness(1.2); border-color: #9a7bff; box-shadow: var(--glow-X); transform: scale(1.05); }
  
  /* 強化活動側邊框張力 */
  .active-side-O { border-color: #f6d26a !important; box-shadow: 0 0 50px rgba(246,210,106,0.3) !important; }
  .active-side-X { border-color: #9a7bff !important; box-shadow: 0 0 50px rgba(154,123,255,0.3) !important; }

  /* 身分標籤放大 */
  .identity-badge { position:absolute; top:-15px; left:50%; transform:translateX(-50%); padding:8px 20px; border-radius:999px; font-size:1.1rem; font-weight:900; background:#000; border:2px solid #fff; z-index:12; white-space:nowrap; }

  /* 能量點 (SP Dot) 大幅放大 */
  .sp-column-vertical { display: flex; flex-direction: column-reverse; gap: 18px; }
  .sp-dot { width: 60px; height: 60px; background-size: contain; background-repeat: no-repeat; transition: 0.4s; }
  .sp-on { box-shadow: 0 0 25px rgba(246, 210, 106, 0.8); }

  /* 棋盤微調放大 */
  .board {display: grid; grid-template-columns: repeat(3, 150px); grid-template-rows: repeat(3, 150px); gap: 18px; padding: 30px; background: rgba(255,255,255,0.08); border-radius: 35px; border: 3px solid rgba(255,255,255,0.15);}
  .cell {font-size: 5.5rem; border-radius: 22px;}

  /* 技能欄位放大 */
  .skill-footer {margin-top: 35px; gap: 20px; padding: 25px 80px; border-radius: 100px; border: 5px solid rgba(255,255,255,0.2);}
  .skill-label { font-size: 2.2rem; padding-right: 45px; }
  .s-btn { width: 280px; height: 130px; border-radius: 30px; }
  .s-btn.active { border: 4px solid #00d4ff; box-shadow: 0 0 30px rgba(0,212,255,0.8); transform: translateY(-10px); }
  .cost-tag { font-size: 1.1rem; padding: 4px 12px; }

  /* 遮罩放大 */
  .action-lock-mask { font-size: 1.5rem; }

  /* 動畫與其他效果維持原樣 */
  @keyframes shake {0%{transform:translate(1px,1px) rotate(0deg);}20%{transform:translate(-3px,0px) rotate(-1deg);}40%{transform:translate(3px,2px) rotate(1deg);}60%{transform:translate(-3px,1px) rotate(-1deg);}80%{transform:translate(3px,1px) rotate(1deg);}100%{transform:translate(1px,-2px) rotate(0deg);}}
  .shake-effect { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
  .hp-img-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
  .hp-bg { filter: brightness(0.2); z-index: 1; }
  .hp-ghost { z-index: 2; filter: brightness(2) saturate(0); transition: clip-path 1s ease-out; opacity: 0.5; }
  .hp-fill { z-index: 3; transition: clip-path 0.3s ease-out; }
  .u-dot { width: 18px; height: 18px; }
  #overlayWait{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(4,7,18,.8);backdrop-filter:blur(8px);z-index:9998}
  #resultOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(3,4,12,.85);backdrop-filter:blur(12px);z-index:10000}
  #resultOverlay.show{display:flex}
  .result-card{min-width:650px; padding:50px; border-radius:40px; border:4px solid rgba(255,255,255,0.3)}
  .result-title{font-size:6rem;}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div id="topbar">
  <div class="pill">戰區房號：<strong id="roomCode" style="color:#00d4ff"></strong></div>
  <div class="pill" id="turnText">系統初始化...</div>
</div>
<div id="timer-container">--</div>
<div class="game-main" id="main-container">
  <div class="hp-visual-container" id="hp-box-O">
    <div id="hp-val-O" class="hp-text">100%</div>
    <img src="left-hp-bar.png" class="hp-img-base hp-bg">
    <img src="left-hp-bar.png" id="hp-ghost-O" class="hp-img-base hp-ghost">
    <img src="left-hp-bar.png" id="hp-fill-O" class="hp-img-base hp-fill">
  </div>
  <div class="side-panel" id="panel-O">
    <div class="identity-badge" id="badge-O">LIGHT / 光之主</div>
    <img src="image_ba490a.png" class="avatar" id="avatar-O" alt="P1">
    <div class="sp-column-vertical" id="sp-display-O"></div>
  </div>
  <div class="board-wrapper board-wrap" id="board-wrap">
    <svg id="win-line-canvas"></svg>
    <div class="board" id="board"></div>
    <div class="action-lock-mask" id="board-lock-mask">對手行動中...</div>
  </div>
  <div class="side-panel" id="panel-X">
    <div class="identity-badge" id="badge-X">SHADOW / 影之裔</div>
    <div class="sp-column-vertical" id="sp-display-X"></div>
    <img src="image_ba4947.png" class="avatar" id="avatar-X" alt="P2">
  </div>
  <div class="hp-visual-container" id="hp-box-X">
    <div id="hp-val-X" class="hp-text">100%</div>
    <img src="right-hp-bar.png" class="hp-img-base hp-bg">
    <img src="right-hp-bar.png" id="hp-ghost-X" class="hp-img-base hp-ghost">
    <img src="right-hp-bar.png" id="hp-fill-X" class="hp-img-base hp-fill">
  </div>
</div>
<div class="skill-footer-wrap interaction-locked" id="skill-footer-wrap">
  <div class="skill-footer" id="skill-footer">
    <div class="usage-dots" id="usage-dots-container"></div>
    <div class="skill-header-row">
      <div class="skill-label">戰技命令</div>
      <div class="skill-list" id="skill-list-container"></div>
    </div>
  </div>
  <div class="action-lock-mask" id="skill-lock-mask">非技能施放階段</div>
</div>
<div id="overlayWait"><div class="box"><h2>建立靈魂連結...</h2><div id="overlayMsg">正在同步戰場數據</div></div></div>
<div id="resultOverlay">
  <div id="resultCard" class="result-card win">
    <h1 id="resultTitle" class="result-title">VICTORY</h1>
    <div id="resultSub" class="result-sub">命運的對決已畫下句點</div>
    <div id="resultRemain" class="result-remain">重返戰場等待：10 秒</div>
    <div class="result-actions">
      <button id="btnRematch">再次挑戰</button>
      <button id="btnBackMenu">回到大廳</button>
    </div>
  </div>
</div>
<script type="module" src="./battle.js"></script>
</body>
</html>

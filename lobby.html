<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>光影對決｜房間等待</title>
<style>
  /* 強化背景與基礎字體 */
  body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:#050816;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg{position:fixed;inset:0;background:#050816 url('Gemini_Generated_Image_axefmzaxefmzaxef.jpg') center/cover no-repeat;filter:brightness(.28);z-index:-2}
  
  /* 放大主容器：從 920px 提升至 1100px */
  .shell{width:min(96vw,1100px);background:rgba(0,0,0,.75);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.18);border-radius:40px;padding:45px;box-shadow:0 0 60px rgba(0,0,0,.5)}
  
  /* 放大標題與副標 */
  h1{margin:0 0 12px;font-size:3.5rem;color:#00d4ff;text-align:center;text-shadow: 0 0 20px rgba(0,212,255,0.5);letter-spacing:4px}
  .sub{opacity:.86;text-align:center;margin-bottom:35px;font-size:1.3rem;letter-spacing:1px}
  
  /* 強化排版間距 */
  .row{display:grid;grid-template-columns:1fr 1fr;gap:30px}
  .card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:30px;display:flex;flex-direction:column;justify-content:space-between}
  .card h2{margin:0 0 20px;font-size:1.8rem;border-left:5px solid #00d4ff;padding-left:15px}
  
  /* 控件大幅放大 */
  .controls{display:flex;flex-wrap:wrap;gap:15px;align-items:center}
  input,select,button{height:58px;border-radius:16px;border:1px solid rgba(255,255,255,.2);padding:0 20px;font-size:1.25rem;transition:all 0.2s}
  input,select{background:rgba(0,0,0,.5);color:#fff;flex:1}
  
  /* 按鈕強化 */
  button{background:linear-gradient(90deg,#00c6ff,#0072ff);color:#fff;font-weight:900;cursor:pointer;box-shadow: 0 4px 15px rgba(0,114,255,0.3)}
  button:hover{transform:scale(1.05);filter:brightness(1.1)}
  button.secondary{background:rgba(255,255,255,.15)}
  button:disabled{opacity:.3;cursor:not-allowed;transform:none}
  
  /* 房號狀態放大 */
  .roomcode{font-size:2.2rem;font-weight:900;color:#f6d26a;letter-spacing:4px;text-shadow:0 0 10px rgba(246,210,106,0.4)}
  .state-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
  .state-box{padding:20px;border-radius:22px;background:rgba(255,255,255,.08);text-align:center;font-size:1.2rem}
  .state-box strong{display:block;margin-bottom:10px;font-size:1.4rem}
  
  /* 狀態列放大 */
  .status{margin-top:25px;padding:20px;border-radius:20px;background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.35);min-height:30px;font-size:1.2rem;text-align:center}
  .countdown{margin-top:20px;font-size:3.5rem;font-weight:900;text-align:center;color:#00d4ff;display:none}
  .tips{margin-top:25px;opacity:.7;font-size:1.1rem;line-height:1.7;background:rgba(0,0,0,0.3);padding:15px;border-radius:15px}
  
  @media (max-width:900px){.row{grid-template-columns:1fr}.shell{padding:25px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="shell">
  <h1>光影對決</h1>
  <div class="sub">先進房、再準備，雙方完成後才進入戰鬥頁</div>
  <div class="row">
    <div class="card">
      <div>
        <h2>房間操作</h2>
        <div class="controls">
          <select id="roleSelect">
            <option value="O">光 / O (主動方)</option>
            <option value="X">影 / X (守護方)</option>
          </select>
          <button id="createBtn">建立新房間</button>
        </div>
        <div class="controls" style="margin-top:15px">
          <input id="roomInput" placeholder="輸入房號" maxlength="8" />
          <button id="joinBtn">加入房間</button>
          <button id="copyBtn" class="secondary">複製</button>
        </div>
      </div>
      <div class="tips">💡 規則：房主建立房間後，另一位玩家輸入房號加入。雙方都點擊「準備」後，戰鬥將在倒數後自動開始。</div>
    </div>
    <div class="card">
      <h2>目前狀態</h2>
      <div style="font-size:1.3rem">房號：<span id="roomCode" class="roomcode">未建立</span></div>
      <div style="margin-top:12px; font-size:1.3rem">你的身份：<strong id="myRoleText" style="color:#00d4ff">未加入</strong></div>
      <div class="state-grid">
        <div class="state-box"><strong>光 / O</strong><div id="statusO" class="warn">等待中</div></div>
        <div class="state-box"><strong>影 / X</strong><div id="statusX" class="warn">等待中</div></div>
      </div>
      <div class="controls" style="margin-top:25px">
        <button id="readyBtn" style="flex:2; height:70px; font-size:1.6rem" disabled>準備就緒</button>
        <button id="leaveBtn" class="secondary" style="flex:1; height:70px" disabled>離開</button>
      </div>
      <div id="statusText" class="status">尚未加入房間</div>
      <div id="countdownText" class="countdown">3</div>
    </div>
  </div>
</div>
<script type="module" src="./lobby.js"></script>
</body>
</html>
